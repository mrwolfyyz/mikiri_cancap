[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
# Check shared utilities and all function main.py files
files = gcp/shared/, gcp/functions/
# Many GCP/AI libraries lack type stubs; suppress globally for now
ignore_missing_imports = True
# Functions share the same filenames (main.py, retry_utils.py, etc.)
explicit_package_bases = True

# Suppress no-any-return globally — most functions return flask.jsonify()
# or google API responses that are typed as Any
disable_error_code = no-any-return

# Suppress implicit Optional warnings — requires codebase-wide refactor
no_implicit_optional = False

# ---- Per-module overrides for functions with Google SDK attr-defined errors ----
# These modules import google.genai / google.cloud.firestore / discoveryengine
# which lack complete type stubs. Suppress until stubs are available.

[mypy-gcp.functions.address_geocoding.main]
disable_error_code = no-any-return, attr-defined

[mypy-gcp.functions.phase1_identity.main]
disable_error_code = no-any-return, attr-defined, dict-item

[mypy-gcp.functions.company_domain_lookup.main]
disable_error_code = no-any-return, attr-defined

[mypy-gcp.functions.address_verification.main]
disable_error_code = no-any-return, attr-defined, var-annotated

[mypy-gcp.functions.api_gateway.main]
disable_error_code = no-any-return, attr-defined, arg-type, union-attr

[mypy-gcp.functions.domain_enrichment.main]
disable_error_code = no-any-return, attr-defined, arg-type, return-value, assignment, index

[mypy-gcp.functions.report_generator_origination.generate_markdown_reports]
disable_error_code = assignment, misc

[mypy-gcp.functions.report_generator_skiptrace.generate_markdown_reports_skiptrace]
disable_error_code = misc
