<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigation Results - Skip Trace Intelligence</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="results.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <div class="container results-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>Borrower Intelligence Platform</h1>
                <p class="subtitle">Investigation Results</p>
            </div>
            <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
                <span class="icon-light">☀️</span>
                <span class="icon-dark">🌙</span>
            </button>
        </header>

        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb">
            <a href="index.html">← Back to Home</a>
            <span class="job-id-breadcrumb">Job ID: <span id="jobIdBreadcrumb">Loading...</span></span>
        </nav>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Loading investigation results...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h3>Failed to Load Results</h3>
            <p id="errorMessage"></p>
            <a href="index.html" class="button">Return to Home</a>
        </div>

        <!-- Results Content -->
        <div id="resultsContent" class="results-content" style="display: none;">
            <!-- Report Header -->
            <div class="report-header">
                <div class="report-info">
                    <h2 id="reportTitle">Investigation Report</h2>
                    <p class="report-meta" id="reportMeta"></p>
                </div>

                <!-- Action Bar -->
                <div class="action-bar" id="actionBar">
                    <!-- Skip Trace Actions -->
                    <div class="skip-trace-actions" id="skipTraceActions" style="display: none;">
                        <label class="toggle-control">
                            <input type="checkbox" id="checklistToggle" checked>
                            <span>Show Checklist</span>
                        </label>
                        <div class="progress-indicator">
                            <span id="checklistProgress">0/0 completed</span>
                        </div>
                        <button id="resetProgress" class="button-secondary">
                            <svg class="button-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 8C14 11.3137 11.3137 14 8 14C4.68629 14 2 11.3137 2 8C2 4.68629 4.68629 2 8 2C9.88889 2 11.5556 2.88889 12.6667 4.22222" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 2V4.5H9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Reset Progress
                        </button>
                    </div>

                    <!-- Origination Actions -->
                    <div class="origination-actions" id="originationActions" style="display: none;">
                        <div class="risk-badge" id="riskBadge" style="display: none;">
                            <span id="riskLevel"></span>
                        </div>
                    </div>

                    <!-- Common Actions -->
                    <div class="common-actions">
                        <a id="openChatButton" href="#" target="_blank" class="button-secondary">
                            <svg class="button-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H2C1.45 2 1 2.45 1 3V11C1 11.55 1.45 12 2 12H4V14.5L7 12H14C14.55 12 15 11.55 15 11V3C15 2.45 14.55 2 14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Ask Questions
                        </a>
                        <button id="exportPdfButton" class="button-secondary" onclick="window.print()">
                            <svg class="button-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 1H3C2.45 1 2 1.45 2 2V14C2 14.55 2.45 15 3 15H13C13.55 15 14 14.55 14 14V6L9 1Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M9 1V6H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Export PDF
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tab Navigation -->
            <nav class="report-tabs" id="reportTabs">
                <!-- Tabs will be dynamically generated based on workflow type -->
            </nav>

            <!-- Tab Content -->
            <div class="tab-panels" id="tabPanels">
                <!-- Tab panels will be dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="results.js"></script>
</body>
</html>
