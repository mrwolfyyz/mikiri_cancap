<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>Investigation Results - Skip Trace Intelligence</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="results.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="report-renderer.js"></script>
</head>
<body>
    <div class="container results-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>Skip Trace Intelligence Platform</h1>
                <p class="subtitle">Investigation Results</p>
            </div>
            <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
                <span class="icon-light">☀️</span>
                <span class="icon-dark">🌙</span>
            </button>
        </header>

        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb">
            <a href="index.html">← Back to Home</a>
            <span class="job-id-breadcrumb">Job ID: <span id="jobIdBreadcrumb">Loading...</span></span>
        </nav>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Loading investigation results...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h3>Failed to Load Results</h3>
            <p id="errorMessage"></p>
            <a href="index.html" class="button">Return to Home</a>
        </div>

        <!-- Results Content (populated by report-renderer.js) -->
        <div id="resultsContent" class="results-content" style="display: none;"></div>
    </div>

    <!-- Scripts -->
    <script src="platform-config.js"></script>
    <script src="shared-utils.js"></script>
    <script src="results.js"></script>
</body>
</html>
