<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>Investigation Results - Skip Trace Intelligence</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="results.css">

    <!-- Firebase SDK (SRI hashes: recompute if upgrading firebase-js, marked, or dompurify versions) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" integrity="sha384-yuGdyIzzYtOBlBG6JOWn+Ey9kpq7HocusNuxEGyyohr1eEyXpeEyehIIXC/hznw4" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" integrity="sha384-lI+CxEx/bCvWP1b0OK13j5HTrTZP7yf1xle8TVOFq2smz6KC1RChTarRV/RHP5PP" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js" integrity="sha384-rxbD+YIVHadImwEcPc07/NNXIMwVf3RtXkQUgI0cE4GzDCFQ9IQ+kLvlefJ/Eb7E" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" integrity="sha384-nwX2Qpkhc2sv6L0ZPkLefLGguao67toSowvePuQvGF6cG+8MUphGI2uI94Ls3JF7" crossorigin="anonymous"></script>

    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" integrity="sha384-zbcZAIxlvJtNE3Dp5nxLXdXtXyxwOdnILY1TDPVmKFhl4r4nSUG1r8bcFXGVa4Te" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu" crossorigin="anonymous"></script>
    <script src="report-renderer.js"></script>
</head>
<body>
    <div class="container results-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>{{headerTitle}}</h1>
                <p class="subtitle">Investigation Results</p>
            </div>
            <div class="header-actions">
                <button id="signOutButton" class="secondary-button auth-signout-button" style="display: none;">
                    Sign out
                </button>
                <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">
                    <span class="icon-light">☀️</span>
                    <span class="icon-dark">🌙</span>
                </button>
            </div>
        </header>

        <!-- Breadcrumb Navigation -->
        <nav class="breadcrumb">
            <a href="index.html">← Back to Home</a>
            <span class="job-id-breadcrumb">Job ID: <span id="jobIdBreadcrumb">Loading...</span></span>
        </nav>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Loading investigation results...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="error-state" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h3>Failed to Load Results</h3>
            <p id="errorMessage"></p>
            <a href="index.html" class="button">Return to Home</a>
        </div>

        <!-- Results Content (populated by report-renderer.js) -->
        <div id="resultsContent" class="results-content" style="display: none;"></div>
    </div>

    <!-- Scripts -->
    <script src="platform-config.js"></script>
    <script src="auth.js"></script>
    <script src="shared-utils.js"></script>
    <script src="results.js"></script>
</body>
</html>
