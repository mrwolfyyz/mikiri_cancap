name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: pytest tests/ -v --ignore=tests/test_golden_set.py --cov-fail-under=95

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check gcp/ tests/

      - name: Ruff format check
        run: ruff format --check gcp/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Bandit security scan
        run: bandit -r gcp/ -x gcp/functions/*/test_* --quiet

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit test dependencies
        # PYSEC-2025-183: pyjwt transitive dep, no fixed version available, vendor disputes
        # classification (says key-length choice is the application's responsibility, not the
        # library's). HIGH attack complexity. Re-evaluate when a fix is released.
        #
        # PYSEC-2026-161: starlette transitive dep (pulled in via functions-framework). No
        # function imports starlette/fastapi/uvicorn — the vulnerable code path is not executed
        # at runtime. Cited fix version 1.0.1 is not yet published on PyPI (latest is 0.49.3),
        # so the dep cannot be upgraded. Re-evaluate when starlette 1.0.1 is released.
        run: pip-audit -r requirements-test.txt --ignore-vuln PYSEC-2025-183 --ignore-vuln PYSEC-2026-161

      - name: Audit function dependencies
        run: |
          for req in gcp/functions/*/requirements.txt; do
            echo "Auditing $req..."
            # PYSEC-2025-183 + PYSEC-2026-161: see test dep step above for rationale.
            pip-audit -r "$req" --ignore-vuln PYSEC-2025-183 --ignore-vuln PYSEC-2026-161
          done

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy and type stubs
        run: pip install mypy types-requests types-python-dateutil

      - name: Type check shared code and functions
        run: mypy gcp/shared/ gcp/functions/

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/
